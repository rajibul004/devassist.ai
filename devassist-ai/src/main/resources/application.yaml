server:
  port: ${PORT:8080}

spring:
  application:
    name: devassist-ai

  datasource:
    url: ${DB_URL}
    username: ${dbUserName}
    password: ${dbPassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  docker:
    compose:
      enabled: false

  ai:
    openai:
      api-key: ${groq-key}
      base-url: ${groq-api}

      chat:
        options:
          model: llama-3.3-70b-versatile

  app:
    jwtSecret: ${jwtSecret}
    jwtExpirationMs: 86400000
    jwtCookieName: devassist