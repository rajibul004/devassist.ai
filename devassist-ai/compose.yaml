services:
  ollama:
    image: 'ollama/ollama:latest'
    ports:
      - '11434'

  postgres:
    image: postgres:latest

    environment:
      POSTGRES_DB: devassist_ai
      POSTGRES_USER: ${dbUserName}
      POSTGRES_PASSWORD: ${dbPassword}

    ports:
      - "5432:5432"


  backend:
    image: devassist-ai:latest

    ports:
      - "8080:8080"

    env_file:
      - .env

    depends_on:
      - postgres